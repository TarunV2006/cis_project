<!DOCTYPE html>
<html>
<head>
    <title>Cloud App Catalog</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 0;
            color: white;
            text-align: center;
        }

        h1 { margin: 20px; }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #ff7e5f;
            color: white;
            cursor: pointer;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            width: 180px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 70px;
            height: 70px;
        }

        .delete-btn {
            background: red;
            margin-top: 8px;
            padding: 5px;
        }
    </style>
</head>

<body>

<h1>☁️ Cloud Application Catalog</h1>

<input type="text" id="appName" placeholder="Enter app name">
<button onclick="addApp()">Add</button>

<br><br>

<input type="text" id="search" placeholder="Search apps..." onkeyup="searchApps()">

<h3 id="count">Total Apps: 0</h3>

<div class="grid" id="grid"></div>

<script>

// 🔥 KNOWN APPS
const appData = {
    "instagram": {img:"https://cdn-icons-png.flaticon.com/512/2111/2111463.png", link:"https://instagram.com"},
    "youtube": {img:"https://cdn-icons-png.flaticon.com/512/1384/1384060.png", link:"https://youtube.com"},
    "netflix": {img:"https://cdn-icons-png.flaticon.com/512/732/732228.png", link:"https://netflix.com"},
    "amazon": {img:"https://cdn-icons-png.flaticon.com/512/5968/5968770.png", link:"https://amazon.in"},
    "swiggy": {img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png", link:"https://swiggy.com"},
    "spotify": {img:"https://cdn-icons-png.flaticon.com/512/2111/2111624.png", link:"https://spotify.com"},
    "github": {img:"https://cdn-icons-png.flaticon.com/512/733/733553.png", link:"https://github.com"}
};

// 🧠 CREATE CARD
function createCard(name) {
    let data;

    if (appData[name]) {
        data = appData[name];
    } else {
        // 🔥 UNKNOWN APP → GOOGLE SEARCH
        data = {
            img: "https://cdn-icons-png.flaticon.com/512/565/565547.png",
            link: "https://www.google.com/search?q=" + name
        };
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <a href="${data.link}" target="_blank">
            <img src="${data.img}">
            <h3>${name}</h3>
        </a>
        <button class="delete-btn" onclick="deleteApp('${name}', this)">Delete</button>
    `;

    document.getElementById("grid").appendChild(card);
}

// ➕ ADD APP
function addApp() {
    const name = document.getElementById("appName").value.toLowerCase();
    if (!name) return;

    createCard(name);
    saveApp(name);
    updateCount();

    document.getElementById("appName").value = "";
}

// 🔍 SEARCH
function searchApps() {
    const value = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
}

// 💾 SAVE
function saveApp(name) {
    let apps = JSON.parse(localStorage.getItem("apps")) || [];
    apps.push(name);
    localStorage.setItem("apps", JSON.stringify(apps));
}

// ❌ DELETE
function deleteApp(name, btn) {
    btn.parentElement.remove();
    let apps = JSON.parse(localStorage.getItem("apps")) || [];
    apps = apps.filter(a => a !== name);
    localStorage.setItem("apps", JSON.stringify(apps));
    updateCount();
}

// 📊 COUNT
function updateCount() {
    document.getElementById("count").innerText =
        "Total Apps: " + document.querySelectorAll(".card").length;
}

// 🔄 LOAD SAVED APPS
window.onload = function() {
    const saved = JSON.parse(localStorage.getItem("apps")) || [];
    saved.forEach(createCard);
    updateCount();
};

</script>

</body>
</html>
