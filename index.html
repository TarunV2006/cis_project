<!DOCTYPE html>
<html>
<head>
    <title>Cloud App Catalog</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 30px 0;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            background: #ff7e5f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            width: 200px;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 80px;
            height: 80px;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>☁️ Cloud Application Catalog</h1>

<input type="text" id="appName" placeholder="Enter app name">
<button onclick="addApp()">Add App</button>

<div class="grid" id="grid"></div>

<script>

// 🔥 APP DATABASE (logo + link)
const apps = {
    "swiggy": {
        img: "https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
        link: "https://www.swiggy.com"
    },
    "instagram": {
        img: "https://cdn-icons-png.flaticon.com/512/2111/2111463.png",
        link: "https://www.instagram.com"
    },
    "youtube": {
        img: "https://cdn-icons-png.flaticon.com/512/1384/1384060.png",
        link: "https://www.youtube.com"
    },
    "netflix": {
        img: "https://cdn-icons-png.flaticon.com/512/732/732228.png",
        link: "https://www.netflix.com"
    },
    "aws": {
        img: "https://cdn-icons-png.flaticon.com/512/873/873120.png",
        link: "https://aws.amazon.com"
    }
};

// 🚀 ADD APP FUNCTION
function addApp() {
    const nameInput = document.getElementById("appName");
    const name = nameInput.value.toLowerCase();

    if (name === "") return;

    const appData = apps[name] || {
        img: "https://cdn-icons-png.flaticon.com/512/565/565547.png",
        link: "#"
    };

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <a href="${appData.link}" target="_blank" style="text-decoration:none; color:black;">
            <img src="${appData.img}">
            <h3>${name}</h3>
        </a>
        <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
    `;

    document.getElementById("grid").appendChild(card);
    nameInput.value = "";
}

</script>

</body>
</html>
