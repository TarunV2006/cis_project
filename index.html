<!DOCTYPE html>
<html>
<head>
    <title>Cloud App Catalog</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 30px 0;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            background: #ff7e5f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            width: 200px;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }

        .card img {
            width: 80px;
            height: 80px;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>☁️ Cloud Application Catalog</h1>

<input type="text" id="appName" placeholder="Enter app name">
<button onclick="addApp()">Add App</button>

<div class="grid" id="grid"></div>

<script>

// 🔥 AUTO IMAGE FUNCTION
function getAppImage(name) {
    name = name.toLowerCase();

    const logos = {
        "swiggy": "https://cdn-icons-png.flaticon.com/512/3075/3075977.png",
        "instagram": "https://cdn-icons-png.flaticon.com/512/2111/2111463.png",
        "aws": "https://cdn-icons-png.flaticon.com/512/873/873120.png",
        "netflix": "https://cdn-icons-png.flaticon.com/512/732/732228.png",
        "youtube": "https://cdn-icons-png.flaticon.com/512/1384/1384060.png"
    };

    return logos[name] || "https://cdn-icons-png.flaticon.com/512/565/565547.png"; // default icon
}

function addApp() {
    const name = document.getElementById("appName").value;

    if (name === "") return;

    const img = getAppImage(name);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${img}">
        <h3>${name}</h3>
        <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
    `;

    document.getElementById("grid").appendChild(card);
    document.getElementById("appName").value = "";
}

</script>

</body>
</html>
