<!DOCTYPE html>
<html>
<head>
<title>Future App Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradientBG {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    text-shadow: 0 0 20px #00f7ff;
    margin-top: 20px;
}

h2 {
    text-shadow: 0 0 10px #00f7ff;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 5px;
    width: 220px;
    outline: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    background: #00f7ff;
    color: black;
    border: none;
    cursor: pointer;
    box-shadow: 0 0 10px #00f7ff;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00f7ff;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

/* 🔥 TEXT CARD STYLE */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,247,255,0.3);
    width: 200px;
    padding: 30px 15px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,247,255,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #00f7ff;
}

/* ✨ APP NAME STYLE */
.card h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
}

.delete-btn {
    background: red;
    margin-top: 10px;
    padding: 6px;
    border-radius: 6px;
}

#count {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🚀 FUTURE APP HUB</h1>

<input type="text" id="appName" placeholder="Enter app name">
<button onclick="addApp()">Add</button>

<br>

<input type="text" id="search" placeholder="Search..." onkeyup="searchApps()">

<h3 id="count"></h3>

<h2>⭐ Featured Apps</h2>
<div class="grid" id="featured"></div>

<h2>➕ Your Apps</h2>
<div class="grid" id="user"></div>

<script>

// ⭐ Featured apps
const featuredApps = [
    "instagram","youtube","netflix","amazon","swiggy","zomato",
    "spotify","twitter","linkedin","facebook","whatsapp",
    "gmail","google","aws","github"
];

// 🧠 CREATE CARD (TEXT ONLY)
function createCard(name, container) {

    const domain = name.replace(/\s+/g, '') + ".com";
    const link = "https://" + domain;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <a href="${link}" target="_blank" style="text-decoration:none; color:white;">
            <h3>${name}</h3>
        </a>
        ${container === "user" ? `<button class="delete-btn" onclick="deleteCard(this)">Delete</button>` : ""}
    `;

    document.getElementById(container).appendChild(card);
}

// ➕ ADD APP
function addApp() {
    const name = document.getElementById("appName").value.trim().toLowerCase();
    if (!name) return;

    createCard(name, "user");
    updateCount();

    document.getElementById("appName").value = "";
}

// ❌ DELETE
function deleteCard(btn) {
    btn.parentElement.remove();
    updateCount();
}

// 🔍 SEARCH
function searchApps() {
    const value = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
}

// 📊 COUNT
function updateCount() {
    document.getElementById("count").innerText =
        "Total Apps: " + document.querySelectorAll(".card").length;
}

// LOAD
window.onload = function() {
    featuredApps.forEach(app => createCard(app, "featured"));
    updateCount();
};

</script>

</body>
</html>
