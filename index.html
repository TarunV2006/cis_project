<!DOCTYPE html>
<html>
<head>
    <title>Cloud App Catalog</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 0;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 30px 0;
        }

        .input-box {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #ff7e5f;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            width: 200px;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 80px;
            height: 80px;
        }

        .delete-btn {
            margin-top: 10px;
            background: red;
            border: none;
            color: white;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>☁️ Cloud Application Catalog</h1>

<div class="input-box">
    <input type="text" id="appName" placeholder="Enter app name">
    <input type="text" id="appImg" placeholder="Paste image URL">
    <button onclick="addApp()">Add App</button>
</div>

<div class="grid" id="grid"></div>

<script>
function addApp() {
    const name = document.getElementById("appName").value;
    const img = document.getElementById("appImg").value;

    if (name === "" || img === "") {
        alert("Enter both name and image URL");
        return;
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${img}" alt="app">
        <h3>${name}</h3>
        <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
    `;

    document.getElementById("grid").appendChild(card);

    document.getElementById("appName").value = "";
    document.getElementById("appImg").value = "";
}
</script>

</body>
</html>
